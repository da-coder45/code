<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SwigShot Offline</title>
    <link rel="stylesheet" href="style.css">
    <script src="init.js"></script>
    <script src="emergency.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 320px; 
            height: 480px; 
            overflow: hidden; 
            background: #000; 
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            object-fit: fill; 
        }
        /* The Secret Layer */
        #click-overlay {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 999; 
            /* This forces the normal arrow */
            cursor: default !important; 
            background: rgba(0,0,0,0);
        }
    </style>
</head>
<body>
    <script src="modernjscheck.js"></script>
    <script src="supportcheck.js"></script>
    
    <script src="box2d.wasm.js"></script>
    <script src="c3runtime.js"></script>
    <script src="objRefTable.js"></script>
    
    <script type="module" src="c3main.js"></script>
    <script type="module" src="main.js"></script>

    <div id="click-overlay"></div>
</body>
</html>
